name: ai_study_assistant
description: "A new Flutter project."
publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter

  # UI and Icons
  cupertino_icons: ^1.0.8
  
  # AI and Machine Learning
  flutter_gemma: ^0.12.6
  tflite_flutter: ^0.12.1
  
  # Voice and Text Processing
  speech_to_text: ^7.3.0
  flutter_tts: ^4.2.5
  flutter_quill: ^11.5.0
  
  # Data Persistence
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.5.4
  flutter_markdown: ^0.7.7+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1 # Added this dependency!

flutter:
  uses-material-design: true

  assets:
    - assets/models/gemma-2b-it-cpu-int8.task
    - assets/icons/ # Added this folder for your logo

# Added the configuration block for the icon generator
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"